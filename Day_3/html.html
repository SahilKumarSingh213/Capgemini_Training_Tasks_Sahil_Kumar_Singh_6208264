<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 40px;
      background-color: #f5f5f5;
    }

    input {
      padding: 8px;
      width: 200px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 8px 12px;
      margin-left: 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #addBtn {
      background-color: #4CAF50;
      color: white;
    }

    .lists {
      display: flex;
      justify-content: center;
      gap: 40px; 
      margin-top: 30px;
    }

    ul {
      padding: 0;
      list-style-type: none;
      min-width: 260px;
    }

    li {
      margin: 8px 0;
      padding: 8px;
      border: 1px solid rgb(154, 193, 240);
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 4px;
    }

    h3 {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <h2>My Todo List</h2>

  <input id="taskInput" type="text" placeholder="Enter task">
  <button id="addBtn">Add</button>

  <div class="lists">

    <div>
      <h3>Tasks</h3>
      <ul id="taskList"></ul>
    </div>

    <div>
      <h3>Completed</h3>
      <ul id="CompletedList"></ul>
    </div>

  </div>

  <script src="js.js" ></script>

</body>
</html>
