<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
</head>
<body>

  <h3>Contact</h3>

  <form>
    Name:
    <input type="text" name="name"><br><br>

    Email:
    <input type="email" name="email"><br><br>

    Message:<br>
    <textarea name="message" rows="3" cols="25"></textarea><br><br>

    <input type="submit" value="Send">
  </form>

</body>
</html>
